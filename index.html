<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja Online Moz</title>
  <link rel="stylesheet" href="Style.css">
</head>

<body>
  <header>
    <h1>Loja Online Moz</h1>
  </header>
  
  <main>

    <!-- Formulário para adicionar produto-->
    <div class="caixa">
      <h2>Adicionar Produto</h2>

      <label for="input-nome">Nome do Produto</label>
      <input type="text" id="input-nome" placeholder="Ex:Carregador Hp">

      <label for="input-preco">Preco (MZN)</label>
      <input type="number" id="input-preco" placeholder="Ex:1500">

      <button id="btn-adicionar">Adicionar Produto</button>
      
      
    </div>

    <!-- Lista de produtos disponíveis-->
    <div class="caixa">
      <h2>Produtos Disponíveis</h2>
      <ul id="lista-produtos"></ul>
    </div>

    <!--Carrinho de compras-->
    <div class="caixa">
      <h2>Carrinho</h2>
      <ul id="lista-carrinho"></ul>

      <p>Quantidade de itens:<strong id="total-quantidade">0</strong></p>
      <p>Total:<strong id="total-preco">0.00 MZN</strong></p>

      <button id="btn-encerrar">Encerrar Compra</button>
    </div>  

  </main>

  <script src="model.js"></script>
  <script src="view.js"></script>
  <script src="controller.js"></script>

</body>
</html>
